<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Canvas</title>
    <link rel="stylesheet" href="../assets/canvas.css">
    <script src="../assets/js/canvas.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="pan">🖐️</div>
        <div class="tool" id="zoom-in">🔍+</div>
        <div class="tool" id="zoom-out">🔍-</div>
        <div class="tool" id="place-element">🔲</div>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
