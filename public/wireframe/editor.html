<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../assets/editor.css">

</head>

<body>

    <div class="drop-down-menu">

        <div id="toolbar">
            <div class="tool" id="cursor" title="Cursor"><button>🚫</button></div>
            <div class="tool" title="Shapes">
                <div class="dropdown">
                    <button class="dropbtn">🔲</button>
                    <div class="dropdown-content" id="dropdown-menu">

                        <a href="#" id="line"><img src="../uploads/line.svg" alt="" height="30px" width="30px"></a>
                        <a href="#"><img src="../uploads/arrow-right.svg" alt="" height="30px" width="30px"></a>
                        <a href="#"><img src="../uploads/image-shapes.svg" alt="" height="30px" width="30px"></a>
                        <a href="#" id="rectangle"><img src="../uploads/rectangle.svg" alt="" height="30px"
                                width="30px"></a>
                        <a href="#" id="circle"><img src="../uploads/circle.svg" alt="" height="30px" width="30px"></a>
                        <a href="#" id="triangle"><img src="../uploads/triangle.svg" alt="" height="30px"
                                width="30px"></a>
                    </div>
                </div>
            </div>
            <div class="tool" id="text" title="Text"><button>🔤</button></div>
            <div class="tool" title="Brush">
                <div class="brush-dropdown">
                    <button class="brush-dropbtn">🖌️</button>
                    <div class="brush-dropdown-content" id="brush-dropdown-menu">
                        <a href="#" id="brush-1">Thin</a>
                        <a href="#" id="brush-2">Medium</a>
                        <a href="#" id="brush-3">Thick</a>
                        <a href="#" id="pencil-brush">Pencil Brush</a>
                        <a href="#" id="circle-brush">Circle Brush</a>
                        <a href="#" id="spray-brush">Spray Brush</a>
                    </div>
                </div>
            </div>

            <div class="tool" id="reset" title="Reset"><button>🔄</button></div>
            <div class="tool" id="delete" title="Delete"><button>❌</button></div>
            <!-- <div class="tool" id="undo" title="Undo"><button>↩️</button></div>
            <div class="tool" id="redo" title="Redo"><button>↪️</button></div> -->

        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <div class="magicToolBarHolder">
        <div class="magicToolBar">
            <div class="widget-search">
                <i class='bx bx-search' ></i>
                <input type="search" name="widget" id="widgetElement">
                
            </div>
            <div class="widget-list">
                <ul>    
                    <div class="widget-list-header">Element</div>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-square-rounded' ></i><div>Box</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-text' ></i><div>Text</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-image' ></i><div>Image</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-checkbox-minus'></i><div>Box</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-circle'></i><div>Circle</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-rectangle'></i><div>Text Input</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-minus' style="rotate: 1 1 0 190deg;"></i><div>Line</div></button>
                    </li>
                    <li >
                        <button type="button" class="flex-row-li" ><i class='bx bx-minus'></i><div>Line</div></button>
                    </li>
                </ul>
            </div>
            <div class="widget-preview">
                <div class="widget-image-container">

                </div>
                <div class="widget-image-info">
                    
                </div>
            </div>
        </div>
    </div>
    <div class="user-toolbar">
        <div class="user-toolbar-btns">
            <div class="profile-dropdown">
                <button id="user-profile">
                    <h1><i class='bx bx-user'></i></h1>
                </button>
                <div class="profile" id="profile-menu">
                    <a href="#" id="username">username</a>
                    <a href="#" id="profileSetting">Profile settings</a>
                    <a href="../wireframe/dashboard.html" id="dasboard">Dashboard</a>
                    <a href="#" id="create-team">Create Team</a>
                </div>
            </div>
        </div>
        
        <div class="file-drop-down">
            <h3 style="color: black;"><i class='bx bx-menu'></i></h3>
            <div class="drop-dron-menu">
                <div class="exportbtn">
                    <button id="element-btn" class="flex-row">
                        <span>All Element</span>
                        <h1><i class='bx bx-right-arrow-alt'></i></h1>
                    </button>
                </div>
                <div class="exportbtn">
                    <button id="export-btn" class="flex-row">
                        <h1><i class='bx bx-export'></i></h1>
                        <span>Export As Json</span>
                    </button>
                </div>
                <div class="savebtn" id="save">
                    <button id="save-btn" class="flex-row">
                        <h1><i class='bx bx-save'></i></h1>
                        <span>Save</span>
                    </button>
                </div>
                <div class="importbtn">
                    <button id="import-btn" class="flex-row">
                        <h1><i class='bx bx-import'></i></h1>
                        <span>Import</span>
                    </button>
                    <input type="file" id="import-input" accept="application/json" style="display: none;">
                </div>

                <div class="sharebtn">
                    <button id="share-btn" class="flex-row">
                        <h1><i class='bx bx-share-alt'></i></h1>
                        <span>Share</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.5.0/fabric.min.js"></script>

    <script src="../assets/js/script.js" defer></script>
    <script src="../assets/js/toolbar.js" defer></script>
</body>

</html>
