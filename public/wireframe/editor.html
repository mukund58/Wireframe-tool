<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link rel="stylesheet" href="../assets/editor.css">
    <script src="../assets/js/script.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="brush" title="Brush Tool">🖌️</div>
        <div class="tool" id="shape" title="Draw Shapes">🔳</div>
        <div class="tool" id="photo" title="Upload Image">🖼️</div>
        <div class="tool" id="erase" title="Eraser">🧽</div>
        <div class="tool" id="undo" title="Undo Last Action">↩️</div>
        <div class="tool" id="save" title="Save Image">💾</div>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
