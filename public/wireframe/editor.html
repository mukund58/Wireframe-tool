<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link rel="stylesheet" href="../assets/editor.css">
    <script src="../assets/js/script.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="brush">🖌️ <br>Brush</div>
        <div class="tool" id="shape">🔳 <br>Shape</div>
        <div class="tool" id="photo">🖼️ <br>Photo</div>
        <div class="tool" id="erase">🧽 <br>Erase</div>
        <div class="tool" id="save">💾 <br>Save</div>
        <!-- <div class="tool" id="zoom-in">🔍+ <br>Zoom In</div> -->
        <!-- <div class="tool" id="zoom-out">🔍- <br>Zoom Out</div> -->
        <div class="tool" id="text">🅰️ <br>Text</div>
        <div class="tool" id="line">📏 <br>Line</div>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
