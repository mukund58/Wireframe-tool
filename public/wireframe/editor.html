<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link rel="stylesheet" href="../assets/editor.css">
    <script src="../assets/js/script.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="brush">🖌️ Brush</div>
        <div class="tool" id="shape">🔳 Shape</div>
        <div class="tool" id="photo">🖼️ Photo</div>
        <div class="tool" id="erase">🧽 Erase</div>
        <div class="tool" id="save">💾 Save</div>
        <div class="tool" id="zoom-in">🔍+ Zoom In</div>
        <div class="tool" id="zoom-out">🔍- Zoom Out</div>
        <div class="tool" id="text">🅰️ Text</div>
        <div class="tool" id="line">📏 Line</div>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
