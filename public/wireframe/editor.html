<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link rel="stylesheet" href="../assets/editor.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.5.0/fabric.min.js"></script>
    <script src="../assets/js/script.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="cursor" title="Cursor">🔲</div>
        <div class="tool" id="shapes" title="Shapes">🔳</div>
        <div class="tool" id="text" title="Text">🔤</div>
        <div class="tool" id="reset" title="Reset">🔄</div>
        <div class="tool" id="delete" title="Delete">❌</div>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
