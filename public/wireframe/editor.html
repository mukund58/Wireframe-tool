<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Editor</title>
    <link rel="stylesheet" href="../assets/editor.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.5.0/fabric.min.js"></script>
    <script src="../assets/js/script.js" defer></script>
</head>
<body>
    <div id="toolbar">
        <div class="tool" id="cursor" title="Cursor">🔲</div>
        <div class="tool" id="shapes" title="Shapes">🔳</div>
        <div class="tool" id="text" title="Text">🔤</div>
        <div class="tool" id="reset" title="Reset">🔄</div>
        <div class="tool" id="delete" title="Delete">❌</div>
        <button class="minimize-button" id="minimize-toolbar">_</button>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="settings-panel">
        <label for="color-picker">Canvas Color:</label>
        <input type="color" id="color-picker">
        
        <label for="canvas-width">Canvas Width (px):</label>
        <input type="number" id="canvas-width" min="100" max="5000">
        
        <label for="canvas-height">Canvas Height (px):</label>
        <input type="number" id="canvas-height" min="100" max="5000">
        <button class="minimize-button" id="minimize-settings">_</button>
    </div>
</body>
</html>
