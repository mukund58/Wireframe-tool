<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../assets/dashboard.css">
    <script src="../assets/js/dashboard.js" defer></script>
</head>
<body>
    <header class="sticky-header">
        <div class="navigation">
            <div class="logo">
                <h1><a href="../index.html"><img src="../uploads/logo.jpeg" width="50px" height="50px" alt=""></a></h1>
            </div>
            <div class="menubar">
                <nav>
                    <a href="../index.html">Home</a>
                    <a href="../wireframe/editor.html">Editor</a>
                    <a href="/">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="dashboard-content">
        <h2>Saved Drafts</h2>
        <div class="drafts-container">
            <!-- Drafts will be dynamically loaded here -->
        </div>
        <div class="export-import-buttons">
            <button id="export-drafts-btn">Export Drafts as JSON</button>
            <button id="import-drafts-btn">Import Drafts from JSON</button>
            <input type="file" id="import-drafts-input" accept="application/json" style="display: none;">
        </div>
    </div>

    <div class="footer">
        <footer>
            © 2025 Wireframe Tool, All rights reserved.
        </footer>
    </div>
</body>
</html>
