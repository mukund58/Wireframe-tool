<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../assets/dashboard.css">
    <link rel="stylesheet" href="../assets/profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header class="sticky-header">
        <div class="navigation">
            <div class="logo">
                <h1><a href="../index.html"><img src="../uploads/logo.jpeg" height="50px" width="50px" alt=""></a></h1>
            </div>
            <div class="menubar">
                <nav>
                    <a href="../index.html">Home</a>
                    <a href="../wireframe/editor.html">Editor</a>
                    <a href="/">Logout</a>
                </nav>
            </div>
        </div>
    </header>
    <div class="container ">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">

                    <div class="card-body">
                        <form>

                            <div class="mb-3 text-center profile ">

                                <img id="profile-pic" src="../uploads/pfp.jpeg" alt="Profile Picture" class="rounded-circle" width="150" height="150">
                                <label for="input-file">Update Image</label>
                                <input type="file" class="form-control mt-2" id="input-file" accept="image/*">
                                <span id="profile-error"></span>
                            </div>
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" onkeyup="validateName()"
                                    placeholder="Enter your full name">
                                    <span id="name-error"> </span>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" onkeyup="validateEmail()" placeholder="Enter your email">
                                <span id="email-error"> </span>

                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" onkeyup="validatePhone()" placeholder="Enter your phone number">
                                <span id="phone-error"> </span>

                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <textarea class="form-control" id="address" rows="3"
                                    placeholder="Enter your address"></textarea>
                                    <span id="address-error"> </span>
                            </div>
                            <div class="mb-3">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea class="form-control" id="bio" rows="4" onkeyup="validateBio()"
                                    placeholder="Tell us about yourself"></textarea>
                                    <span id="bio-error"> </span>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" onclick="return validateForm()">Save Changes</button>
                                <span id="submit-error"> </span>
                                <button type="reset" class="btn btn-secondary">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="footer">
        <footer>
            © 2025 Wireframe Tool, All rights reserved.
        </footer>
    </div>
    <script src="../assets/js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
