<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../assets/dashboard.css">
    <link rel="stylesheet" href="../assets/profile.css">
    <script src="../assets/js/profile.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
     <header class="sticky-header">
        <div class="navigation">
            <div class="logo">
                <h1><a href="/">Wireframe Tool</a></h1>
            </div>
            <div class="menubar">
                <nav>
                    <a href="/">Home</a>
                    <a href="../wireframe/editor.html">Editor</a>
                    <a href="/">Logout</a>
                </nav>
            </div>
        </div>
    </header>
    <div class="container ">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    
                    <div class="card-body">
                        <form>
                            
                            <div class="mb-3 text-center profile ">
                                <label for="profileImage" class="form-label">Profile Image</label>
                                <br>
                                <img id="previewImage" src="https://via.placeholder.com/150" alt="Profile Picture" class="rounded-circle" width="150" height="150">
                                <input type="file" class="form-control mt-2" id="profileImage" accept="image/*">
                                <button type="button" class="btn btn-primary mt-2">Upload</button>
                            </div>
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number">
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <textarea class="form-control" id="address" rows="3" placeholder="Enter your address"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea class="form-control" id="bio" rows="4" placeholder="Tell us about yourself"></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <button type="reset" class="btn btn-secondary">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="footer">
        <footer>
            © 2025 Wireframe Tool, All rights reserved.
        </footer>
    </div>
</body>
</html>
