<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodingDung | Profile Template</title>
    <!-- <link rel="stylesheet" href="../assets/css/setting.css"> -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-gray-100">
    <header class="sticky top-0 bg-red-500  shadow-md">
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center">
                <a href="../index.html">
                    <img src="../uploads/logo.png" alt="Logo" class="h-12 w-12 invert" >
                </a>
            </div>
            <nav class="space-x-6 " >
                <a href="../index.html" class="text-white ">Home</a>
                <a href="../wireframe/editor.html" class="text-white ">Editor</a>
                <a href="/" class="text-white ">Logout</a>
            </nav>
        </div>
    </header>
    <div class="container mx-auto p-6">
        <h4 class="text-xl font-bold mb-4">Account Settings</h4>
        <div class="bg-white shadow-md rounded-lg p-6 flex">
            <div class="w-1/4 border-r">
                <div class="space-y-4">
                    <a class="block p-2 bg-blue-500 text-white rounded-md" href="#account-general">General</a>
                    <a class="block p-2 hover:bg-gray-200 rounded-md" href="#account-change-password">Change Password</a>
                    <a class="block p-2 hover:bg-gray-200 rounded-md" href="#account-info">Info</a>
                    <a class="block p-2 hover:bg-gray-200 rounded-md" href="#account-social-links">Social Links</a>
                    <a class="block p-2 hover:bg-gray-200 rounded-md" href="#account-connections">Connections</a>
                    <a class="block p-2 hover:bg-gray-200 rounded-md" href="#account-notifications">Notifications</a>
                </div>
            </div>
            <div class="w-3/4 p-6">
                <div id="account-general">
                    <div class="flex items-center space-x-4 mb-4">
                        <img src="https://bootdey.com/img/Content/avatar/avatar1.png" class="h-20 w-20 rounded-full">
                        <div>
                            <label class="cursor-pointer bg-blue-500 text-white px-4 py-2 rounded-md">
                                Upload new photo
                                <input type="file" class="hidden">
                            </label>
                            <button class="ml-2 px-4 py-2 bg-gray-300 rounded-md">Reset</button>
                            <p class="text-gray-500 text-sm mt-1">Allowed JPG, GIF or PNG. Max size of 800K</p>
                        </div>
                    </div>
                    <hr class="border-gray-300 my-4">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700">Username</label>
                            <input type="text" class="w-full p-2 border rounded-md" value="nmaxwell">
                        </div>
                        <div>
                            <label class="block text-gray-700">Name</label>
                            <input type="text" class="w-full p-2 border rounded-md" value="Nelle Maxwell">
                        </div>
                        <div>
                            <label class="block text-gray-700">E-mail</label>
                            <input type="email" class="w-full p-2 border rounded-md" value="nmaxwell@mail.com">
                            <div class="bg-yellow-200 text-yellow-700 p-2 mt-2 rounded-md">
                                Your email is not confirmed. Please check your inbox.<br>
                                <a href="#" class="text-blue-500">Resend confirmation</a>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700">Company</label>
                            <input type="text" class="w-full p-2 border rounded-md" value="Company Ltd.">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
